<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 01</title>
</head>

<body>
    <h1>Class 01</h1>

    <div>
        <input type="text" id="memoInput">
        <button id="memoBtn">Add Memo</button>
        <ul id="memoLst"></ul>
    </div>

    <!-- <script src="script.js"></script> -->
    <script>
        const memoInput = document.getElementById("memoInput");
        const memoBtn = document.getElementById("memoBtn");
        const memoLst = document.getElementById("memoLst");

        function getMemoText() {
            return memoInput.value.trim();
        }

        function createMemoItem(text) {
            const li = document.createElement("li");
            li.textContent = text;
            return li;
        }

        function resetInput() {
            memoInput.value = "";
            memoInput.focus();
        }

        function addMemo() {
            const memoText = getMemoText();

            if (memoText === "") {
                return;
            }

            const memoItem = createMemoItem(memoText);
            memoLst.appendChild(memoItem);
            resetInput();
        }

        memoBtn.addEventListener("click", addMemo);
    </script>
</body>

</html>
